name: Build & Deploy Backend (Flask / Docker)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  # ======================
  # 1. Build & push image
  # ======================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bk-witten-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ======================
  # 2. Deploy on server
  # ======================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Setup SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Validate the server host key instead of disabling host-key checking
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Write env file on server and deploy
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          BACKEND_JWT_SECRET_KEY: ${{ secrets.BACKEND_JWT_SECRET_KEY }}
          BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
          WEBUNTIS_SERVER: ${{ secrets.WEBUNTIS_SERVER }}
          WEBUNTIS_SCHOOL: ${{ secrets.WEBUNTIS_SCHOOL }}
        run: |
          # Write the env file to the server with restricted permissions,
          # then start the container using --env-file (avoids secrets in ps output).
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ~/bk-witten-backend && chmod 700 ~/bk-witten-backend"

          # Transfer env file over SSH stdin so it is never stored on the runner
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > ~/bk-witten-backend/.env && chmod 600 ~/bk-witten-backend/.env" << EOF
          SECRET_KEY=${BACKEND_SECRET_KEY}
          JWT_SECRET_KEY=${BACKEND_JWT_SECRET_KEY}
          DATABASE_URL=sqlite:////app/instance/bkwitten.db
          FLASK_ENV=production
          CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
          WEBUNTIS_SERVER=${WEBUNTIS_SERVER}
          WEBUNTIS_SCHOOL=${WEBUNTIS_SCHOOL}
          EOF

          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << SSHEOF
            set -e

            # Pull the latest image
            docker pull ${DOCKERHUB_USERNAME}/bk-witten-backend:latest

            # Gracefully stop the old container (30-second timeout)
            docker stop --time 30 bk-witten-backend 2>/dev/null || true
            docker rm   bk-witten-backend 2>/dev/null || true

            # Start a new container
            # - Port 5000 is exposed so the nginx reverse-proxy can reach it.
            # - A named volume keeps the SQLite database between deployments.
            # - Secrets are loaded from the env file (not visible in ps output).
            docker run -d \
              --name bk-witten-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              -v bk-witten-db:/app/instance \
              --env-file ~/bk-witten-backend/.env \
              ${DOCKERHUB_USERNAME}/bk-witten-backend:latest

            # Remove unused images to free disk space
            docker image prune -f
          SSHEOF

      - name: Verify container is running
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker ps --filter name=bk-witten-backend --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

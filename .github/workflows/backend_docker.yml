name: Deploy Flask Backend via Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bk-backend:latest
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          
            echo "📦 Pull image"
            docker pull kascabrel/bk-backend:latest

            echo "🛑 Stop old container"
            docker stop bk-backend || true
            docker rm bk-backend || true

            echo "🚀 Run new container"
            docker run -d \
              --name bk-backend \
              -p 5001:5000 \
              --env-file ~/bk-backend/.env \
              kascabrel/bk-backend:latest

            echo "✅ Done"
          EOF